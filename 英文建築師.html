<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文建築師</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 🟢 引入 Firebase 傳統版 (Compat)，徹底解決模組載入導致的「空白網頁」問題 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* 針對列印的樣式優化 */
    @media print {
      .print\:hidden { display: none !important; }
      body { background: white !important; }
      .shadow-lg, .shadow-xl { box-shadow: none !important; border: 1px solid #e2e8f0; }
    }
    
    /* 載入動畫 */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =========================================================================
    // 🚀 老師專屬：Firebase 雲端資料庫設定區
    // =========================================================================
    // 您的專屬設定碼已為您填妥
    const USER_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBvVtaIL-4FhgIJX34dUcvVXFiu50AWNNw",
      authDomain: "vocabulary-89032.firebaseapp.com",
      projectId: "vocabulary-89032",
      storageBucket: "vocabulary-89032.firebasestorage.app",
      messagingSenderId: "745901975039",
      appId: "1:745901975039:web:3b90101278d2433550f3ca"
    };
    // =========================================================================

    // --- 全域變數定義 ---
    const BOOKS = ['七上', '七下', '八上', '八下', '九上', '九下'];
    const UNITS = ['U1', 'U2', 'U3', 'U4', 'U5', 'U6'];
    const CATEGORIES = ['全部單字', '對話單字', '主題單字', '閱讀單字'];

    // --- 預設單字庫 (包含所有冊別與單元) ---
    const DEFAULT_VOCAB_DATA = BOOKS.reduce((acc, book) => {
      acc[book] = UNITS.reduce((uAcc, unit) => {
        uAcc[unit] = [];
        return uAcc;
      }, {});
      return acc;
    }, {});

    // 在「七上 U1」放入預設範例單字
    DEFAULT_VOCAB_DATA['七上']['U1'] = [
      { "id": 1, "category": "主題單字", "word": "architect", "meaning": "建築師", "image": "", "audio": "" },
      { "id": 2, "category": "主題單字", "word": "vocabulary", "meaning": "字彙", "image": "", "audio": "" },
      { "id": 3, "category": "對話單字", "word": "interactive", "meaning": "互動的", "image": "", "audio": "" },
      { "id": 4, "category": "對話單字", "word": "education", "meaning": "教育", "image": "", "audio": "" },
      { "id": 5, "category": "閱讀單字", "word": "student", "meaning": "學生", "image": "", "audio": "" },
      { "id": 6, "category": "閱讀單字", "word": "computer", "meaning": "電腦", "image": "", "audio": "" }
    ];

    // --- 共用工具函式 ---
    const playAudio = (text, customAudioUrl = null, rate = 0.9) => {
      if (customAudioUrl) {
        const audio = new Audio(customAudioUrl);
        audio.playbackRate = rate;
        audio.play().catch(e => console.error('音檔播放失敗，可能網址無效', e));
      } else if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = rate;
        window.speechSynthesis.speak(utterance);
      }
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // --- 主應用程式元件 ---
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [studentName, setStudentName] = useState('');
      
      // 密碼驗證狀態
      const [showPwdPrompt, setShowPwdPrompt] = useState(false);
      const [pwdInput, setPwdInput] = useState('');
      const [isTeacherAuthenticated, setIsTeacherAuthenticated] = useState(false);
      
      // Firebase 相關狀態
      const [user, setUser] = useState(null);
      const [allVocabData, setAllVocabData] = useState(null); // null 表示載入中
      const [isSaving, setIsSaving] = useState(false);

      // --- 1. 傳統方式初始化 Firebase ---
      useEffect(() => {
        const initFirebase = async () => {
          try {
            // 檢查 Firebase 是否成功載入（若被擋廣告軟體阻擋，自動降級）
            if (typeof firebase === 'undefined') {
              console.warn("無法載入 Firebase 核心套件，降級為本地模式。");
              setAllVocabData(DEFAULT_VOCAB_DATA);
              return;
            }

            // 避免重複初始化
            if (!firebase.apps.length) {
              firebase.initializeApp(USER_FIREBASE_CONFIG);
            }
            
            const auth = firebase.auth();
            window.db = firebase.firestore();

            // 匿名登入
            await auth.signInAnonymously();
            
            auth.onAuthStateChanged((u) => {
              setUser(u);
            });
          } catch (err) {
            console.error("驗證或初始化失敗:", err);
            // 發生錯誤也確保網頁不會空白
            setAllVocabData(DEFAULT_VOCAB_DATA);
          }
        };
        initFirebase();
      }, []);

      // --- 2. 監聽 Firestore 即時資料 ---
      useEffect(() => {
        if (!user || !window.db) return;

        // 連接到您的資料庫路徑
        const docRef = window.db.collection('vocabulary').doc('dictionary');

        const unsubscribe = docRef.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            let data = snapshot.data();
            // --- 資料庫相容性處理 (如果是舊版只有 U1~U6 的資料，將其移入「七上」) ---
            if (data && data['U1'] && !data['七上']) {
              const migratedData = JSON.parse(JSON.stringify(DEFAULT_VOCAB_DATA));
              migratedData['七上'] = data;
              data = migratedData;
            }
            setAllVocabData(data);
          } else {
            // 資料庫是空的，自動寫入預設資料
            docRef.set(DEFAULT_VOCAB_DATA);
            setAllVocabData(DEFAULT_VOCAB_DATA);
          }
        }, (error) => {
          console.error("讀取即時資料失敗:", error);
          setAllVocabData(DEFAULT_VOCAB_DATA);
        });

        return () => unsubscribe();
      }, [user]);

      // --- 儲存資料至雲端 ---
      const saveVocabList = async (newData) => {
        setIsSaving(true);
        try {
          if (window.db) {
            const docRef = window.db.collection('vocabulary').doc('dictionary');
            await docRef.set(newData);
            alert("✅ 資料已成功儲存至雲端，學生畫面將自動同步更新！");
          } else {
            // 本地測試模式降級
            setAllVocabData(newData);
            alert("⚠️ 目前無法連線雲端，資料僅暫存於您的瀏覽器。");
          }
          setCurrentView('home');
        } catch (e) {
          console.error('儲存失敗', e);
          alert("❌ 儲存失敗！請確認 Firebase 的「Authentication -> 匿名登入」已啟用，且「Firestore -> 規則 (Rules)」已設為測試模式！");
        } finally {
          setIsSaving(false);
        }
      };

      // 學生選擇的冊別、單元、分類與題號範圍
      const [selectedBook, setSelectedBook] = useState('七上');
      const [selectedUnit, setSelectedUnit] = useState('U1');
      const [selectedCategory, setSelectedCategory] = useState('全部單字');
      const [selectedRange, setSelectedRange] = useState('全部');

      // 1. 先依冊別、單元與分類過濾出基礎清單
      const baseVocabList = useMemo(() => {
        if (!allVocabData) return [];
        const bookData = allVocabData[selectedBook] || {};
        const list = bookData[selectedUnit] || [];
        if (selectedCategory !== '全部單字') {
          return list.filter(v => v.category === selectedCategory);
        }
        return list;
      }, [allVocabData, selectedBook, selectedUnit, selectedCategory]);

      // 當冊別、單元或分類改變時，自動重置題號範圍為「全部」
      useEffect(() => {
        setSelectedRange('全部');
      }, [selectedBook, selectedUnit, selectedCategory]);

      // 計算真實的起始編號
      const startIndex = useMemo(() => {
        if (selectedRange === '全部') return 0;
        return parseInt(selectedRange.split('-')[0], 10) - 1;
      }, [selectedRange]);

      // 2. 再依題號範圍過濾出最終要測驗的清單
      const activeVocabList = useMemo(() => {
        if (selectedRange !== '全部') {
          const parts = selectedRange.split('-');
          if (parts.length === 2) {
            const start = parseInt(parts[0], 10) - 1;
            const end = parseInt(parts[1], 10);
            return baseVocabList.slice(start, end);
          }
        }
        return baseVocabList;
      }, [baseVocabList, selectedRange]);

      const [trackingData, setTrackingData] = useState({
        t1Completed: false,
        t2TrafficLights: {},
        t3CompletedLevels: [],
        usedForcePass: false
      });

      const updateTracking = (key, value) => {
        setTrackingData(prev => ({ ...prev, [key]: value }));
      };

      const handleStart = (name) => {
        setStudentName(name);
        setTrackingData({
          t1Completed: false,
          t2TrafficLights: {},
          t3CompletedLevels: [],
          usedForcePass: false
        });
        setCurrentView('t1');
      };

      const handleTeacherLogin = () => {
        if (pwdInput === '1234') {
          setIsTeacherAuthenticated(true);
          setShowPwdPrompt(false);
          setPwdInput('');
          setCurrentView('teacher');
        } else {
          alert('密碼錯誤！請輸入 1234');
          setPwdInput('');
        }
      };

      // --- 畫面載入中判定 ---
      if (!allVocabData) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
             <div className="loader mb-4"></div>
             <p className="text-xl font-bold text-indigo-600 mt-4">正在連接雲端資料庫...</p>
             <p className="text-slate-500 mt-2 text-sm">如果一直停留在這，請重新整理網頁</p>
          </div>
        );
      }

      const renderView = () => {
        switch (currentView) {
          case 'home':
            return <HomeView 
                      onStart={handleStart} 
                      activeVocabList={activeVocabList} 
                      totalCategoryWords={baseVocabList.length}
                      initialName={studentName}
                      selectedBook={selectedBook}
                      setSelectedBook={setSelectedBook}
                      selectedUnit={selectedUnit}
                      setSelectedUnit={setSelectedUnit}
                      selectedCategory={selectedCategory}
                      setSelectedCategory={setSelectedCategory}
                      selectedRange={selectedRange}
                      setSelectedRange={setSelectedRange}
                      startIndex={startIndex}
                   />;
          case 'teacher':
            return <TeacherEditView 
                      allVocabData={allVocabData} 
                      onSave={saveVocabList} 
                      isSaving={isSaving}
                      onCancel={() => setCurrentView('home')} 
                   />;
          case 't1':
            return <Task1Flashcards vocabList={activeVocabList} startIndex={startIndex} onComplete={() => { updateTracking('t1Completed', true); setCurrentView('t2'); }} />;
          case 't2':
            return <Task2TrafficLight vocabList={activeVocabList} startIndex={startIndex} initialData={trackingData.t2TrafficLights} onComplete={(data) => { updateTracking('t2TrafficLights', data); setCurrentView('t3'); }} />;
          case 't3':
            return <Task3PingPong 
                      vocabList={activeVocabList} 
                      startIndex={startIndex}
                      completedLevels={trackingData.t3CompletedLevels}
                      onLevelComplete={(levelId, usedForce) => {
                        const newLevels = trackingData.t3CompletedLevels.includes(levelId) 
                          ? trackingData.t3CompletedLevels 
                          : [...trackingData.t3CompletedLevels, levelId];
                        updateTracking('t3CompletedLevels', newLevels);
                        if(usedForce) updateTracking('usedForcePass', true);
                      }}
                      onCompleteAll={() => setCurrentView('t4')} 
                    />;
          case 't4':
            return <Task4Export 
                      vocabList={activeVocabList} 
                      startIndex={startIndex}
                      studentName={studentName} 
                      trackingData={trackingData} 
                      setCurrentView={setCurrentView}
                      selectedBook={selectedBook}
                      selectedUnit={selectedUnit}
                      selectedCategory={selectedCategory}
                      selectedRange={selectedRange}
                   />;
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-200 flex flex-col relative">
          <nav className="bg-indigo-600 text-white p-4 shadow-md print:hidden shrink-0 z-10">
            <div className="max-w-6xl mx-auto flex justify-between items-center">
              <h1 className="text-xl font-bold flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                <span className="text-2xl">🏛️</span> 英文建築師
              </h1>
              <div className="flex items-center gap-4 text-sm">
                {currentView !== 'teacher' && (
                  <button 
                    onClick={() => isTeacherAuthenticated ? setCurrentView('teacher') : setShowPwdPrompt(true)} 
                    className="bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded text-xs transition-colors shadow-sm font-bold"
                  >
                    ✏️ 老師編輯區
                  </button>
                )}
                {currentView !== 'home' && currentView !== 'teacher' && (
                  <div className="hidden md:block text-indigo-200 font-medium">
                    {selectedBook} - {selectedUnit} ({selectedRange})
                  </div>
                )}
                <div className="bg-indigo-700 px-3 py-1 rounded-full">{studentName ? `學生: ${studentName}` : '未登入'}</div>
              </div>
            </div>
          </nav>
          
          <div className="max-w-6xl mx-auto w-full p-4 md:p-6 mt-2 flex flex-col md:flex-row gap-6 flex-1">
            {currentView !== 'teacher' && (
              <Sidebar 
                currentView={currentView} 
                setCurrentView={setCurrentView} 
                trackingData={trackingData} 
                vocabCount={activeVocabList.length}
                studentName={studentName}
              />
            )}
            
            <main className={`flex-1 min-w-0 ${currentView === 'teacher' ? 'max-w-4xl mx-auto w-full' : ''}`}>
              {renderView()}
            </main>
          </div>

          {/* --- 老師密碼輸入彈窗 --- */}
          {showPwdPrompt && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                <div className="text-4xl mb-4">🔐</div>
                <h3 className="text-2xl font-bold mb-2 text-slate-800">老師身分驗證</h3>
                <p className="text-slate-500 mb-6 text-sm">請輸入管理密碼進入編輯區。<br/>(預設密碼：1234)</p>
                <input 
                  type="password" 
                  value={pwdInput} 
                  onChange={e => setPwdInput(e.target.value)} 
                  onKeyDown={e => e.key === 'Enter' && handleTeacherLogin()}
                  className="w-full border-2 border-slate-300 p-3 rounded-xl mb-6 text-center text-xl tracking-widest focus:outline-none focus:border-indigo-500" 
                  placeholder="••••"
                  autoFocus
                />
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowPwdPrompt(false)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">取消</button>
                  <button onClick={handleTeacherLogin} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-md">登入</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 左側功能欄元件 (Sidebar) ---
    function Sidebar({ currentView, setCurrentView, trackingData, vocabCount, studentName }) {
      const steps = [
        { id: 'home', title: '0. 英文建築師', isDone: !!studentName },
        { id: 't1', title: 'T1. 單字閃示卡', isDone: trackingData.t1Completed },
        { id: 't2', title: 'T2. 單字紅綠燈', isDone: Object.keys(trackingData.t2TrafficLights).length === vocabCount && vocabCount > 0 },
        { id: 't3', title: 'T3. 單字乒乓賽', isDone: trackingData.t3CompletedLevels.length === 4 },
        { id: 't4', title: 'T4. 學習歷程報告', isDone: trackingData.t1Completed && (Object.keys(trackingData.t2TrafficLights).length === vocabCount) && (trackingData.t3CompletedLevels.length === 4) }
      ];

      return (
        <aside className="w-full md:w-64 shrink-0 print:hidden">
          <div className="bg-white rounded-2xl shadow-md p-4 sticky top-4 border-t-4 border-indigo-400">
            <h3 className="font-bold text-lg text-slate-700 mb-4 border-b pb-2 flex items-center gap-2">
              <span>📋</span> 任務進度
            </h3>
            <ul className="space-y-2">
              {steps.map((step) => {
                const isActive = currentView === step.id;
                return (
                  <li key={step.id}>
                    <button
                      onClick={() => setCurrentView(step.id)}
                      className={`w-full text-left flex items-center gap-3 p-3 rounded-xl transition-all ${
                        isActive 
                          ? 'bg-indigo-50 text-indigo-700 font-bold border border-indigo-200 shadow-sm' 
                          : 'text-slate-600 hover:bg-slate-50 border border-transparent'
                      } ${!isActive && step.isDone ? 'text-green-600 font-medium' : ''}`}
                    >
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${
                        isActive ? 'bg-indigo-500 text-white' : 
                        step.isDone ? 'bg-green-500 text-white' : 
                        'bg-slate-100 text-slate-300'
                      }`}>
                        {step.isDone && !isActive ? '✓' : ''}
                        {isActive ? '●' : ''}
                      </div>
                      <span className="flex-1 text-sm md:text-base">{step.title}</span>
                    </button>
                  </li>
                );
              })}
            </ul>
          </div>
        </aside>
      );
    }

    // --- 視圖: 教師編輯區 ---
    function TeacherEditView({ allVocabData, onSave, isSaving, onCancel }) {
      const [editBook, setEditBook] = useState('七上');
      const [editUnit, setEditUnit] = useState('U1');
      const [inputText, setInputText] = useState("");
      const [error, setError] = useState("");

      // 當切換冊別或單元時，載入對應的資料並轉為文字格式
      useEffect(() => {
        const bookData = allVocabData[editBook] || {};
        const unitList = bookData[editUnit] || [];
        const textFormat = unitList.map(v => {
          let line = `${v.category} | ${v.word} | ${v.meaning}`;
          if (v.image || v.audio) line += ` | ${v.image || ''}`;
          if (v.audio) line += ` | ${v.audio}`;
          return line;
        }).join('\n');
        setInputText(textFormat);
        setError("");
      }, [editBook, editUnit, allVocabData]);

      // 解析輸入框內容的共用函數
      const parseInput = () => {
        const lines = inputText.split('\n');
        const newList = [];
        let idCount = 1;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          
          const parts = line.split('|').map(s => s.trim());
          if (parts.length < 2) {
            setError(`第 ${i + 1} 行格式錯誤，至少需要包含英文與中文 (用 | 區隔)`);
            return null;
          }

          let category = "主題單字"; // 預設類別
          let wordIdx = 0;
          const firstPart = parts[0];
          if (/^(對話|主題|閱讀)(單字)?$/.test(firstPart)) {
            if (firstPart.includes('對話')) category = '對話單字';
            else if (firstPart.includes('閱讀')) category = '閱讀單字';
            else category = '主題單字';
            wordIdx = 1;
          }

          const word = parts[wordIdx];
          const meaning = parts[wordIdx + 1];
          const image = parts[wordIdx + 2] || "";
          const audio = parts[wordIdx + 3] || "";

          if (!word || !meaning) {
             setError(`第 ${i + 1} 行格式解析失敗，請確保有單字與意思`);
             return null;
          }

          newList.push({ id: idCount++, category, word, meaning, image, audio });
        }
        setError("");

        // 保證其他冊別資料不遺失
        const updatedBookData = { ...(allVocabData[editBook] || {}) };
        updatedBookData[editUnit] = newList;

        return { ...allVocabData, [editBook]: updatedBookData };
      };

      const handleSave = () => {
        const newData = parseInput();
        if (newData) onSave(newData); // 直接呼叫父層的儲存(上傳雲端)
      };

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-indigo-500 w-full">
          <h2 className="text-2xl font-bold text-indigo-700 mb-6 flex items-center gap-2">
            ✏️ 資料編輯區 (雲端即時同步)
          </h2>

          <div className="mb-4">
            <label className="text-sm font-bold text-slate-700 mb-2 block">1. 選擇冊別：</label>

    // --- 視圖 1: 單字閃示卡 ---

    // --- 視圖 3: 單字乒乓賽 ---
    function Task3PingPong({ vocabList, startIndex, completedLevels, onLevelComplete, onCompleteAll }) {
      const [selectedLevel, setSelectedLevel] = useState(null);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [options, setOptions] = useState([]);
      const [feedback, setFeedback] = useState(null);
      const [usedForcePass, setUsedForcePass] = useState(false);
      const [isListening, setIsListening] = useState(false);
      const [speechError, setSpeechError] = useState("");

      const currentWord = vocabList[currentWordIndex];
      const isLevelFinished = selectedLevel && currentWordIndex >= vocabList.length;

      const levelInfo = {
        1: { title: "L1 聽音辨字", desc: "Listen & Choose Word", color: "text-purple-600", border: "border-purple-500" },
        2: { title: "L2 聽音辨義", desc: "Listen & Choose Meaning", color: "text-pink-600", border: "border-pink-500" },
        3: { title: "L3 看英說英", desc: "See Word, Speak English", color: "text-orange-600", border: "border-orange-500" },
        4: { title: "L4 看中說英", desc: "See Chinese, Speak English", color: "text-red-600", border: "border-red-500" }
      };

      const startLevel = (lvl) => {
        setSelectedLevel(lvl);
        setCurrentWordIndex(0);
        setFeedback(null);
        setUsedForcePass(false);
        setIsListening(false);
        setSpeechError("");
      };

      useEffect(() => {
        if (selectedLevel && selectedLevel <= 2 && !isLevelFinished && currentWord) {
          const wrongOptions = vocabList.filter(v => v.id !== currentWord.id).sort(() => 0.5 - Math.random()).slice(0, 3);
          setOptions(shuffleArray([...wrongOptions, currentWord]));
          if (selectedLevel === 1 || selectedLevel === 2) setTimeout(() => playAudio(currentWord.word, currentWord.audio), 300);
        }
      }, [currentWordIndex, selectedLevel, isLevelFinished, currentWord, vocabList]);

      const handleChoice = (selectedVocab) => {
        if (selectedVocab.id === currentWord.id) {
          setFeedback('correct'); 
          playAudio("Correct");
          setTimeout(() => { setFeedback(null); setCurrentWordIndex(prev => prev + 1); }, 1000);
        } else {
          setFeedback('wrong'); setTimeout(() => setFeedback(null), 800);
        }
      };

      const handleListen = async () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setSpeechError("您的瀏覽器不支援語音辨識功能，請使用 Chrome 或 Edge，或點擊下方強制通關。");
          return;
        }

        setIsListening(true); 
        setSpeechError("");

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.toLowerCase().trim();
          const cleanTranscript = transcript.replace(/[.,!?]/g, "");
          const targetWord = currentWord.word.toLowerCase();

          if (cleanTranscript.includes(targetWord) || targetWord.includes(cleanTranscript)) {
            setFeedback('correct'); playAudio("Excellent");
            setTimeout(() => { setFeedback(null); setCurrentWordIndex(prev => prev + 1); }, 1000);
          } else {
            setFeedback('wrong'); setSpeechError(`系統聽到的是: "${transcript}"，再試一次！`);
            setTimeout(() => setFeedback(null), 2000);
          }
          setIsListening(false);
        };
        
        recognition.onerror = (e) => {
          console.error("語音錯誤:", e.error);
          setIsListening(false);
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            setSpeechError("麥克風存取被拒絕 🚫 請點擊網址列左側的「🔒鎖頭」圖示，允許麥克風權限後重試。");
          } else if (e.error === 'no-speech') {
            setSpeechError("沒有聽到聲音，請再說一次！");
          } else {
            setSpeechError(`語音辨識發生錯誤 (${e.error})，請重試或點擊下方強制通關。`);
          }
        };
        
        recognition.onend = () => setIsListening(false);

        try {
          recognition.start();
        } catch (err) {
          console.error("語音辨識啟動失敗:", err);
          setIsListening(false);
          setSpeechError("無法啟動麥克風，請重整網頁後再試，或使用「強制通關」。");
        }
      };

      const forcePass = () => {
        setUsedForcePass(true); setFeedback('correct');
        setTimeout(() => { setFeedback(null); setCurrentWordIndex(prev => prev + 1); setSpeechError(""); }, 500);
      };

      if (!vocabList || vocabList.length === 0) return null;

      if (!selectedLevel) {
        const isAllDone = completedLevels.length >= 4;
        return (
          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-indigo-500 w-full">
            <h2 className="text-2xl font-bold text-indigo-700 mb-2">T3. 單字乒乓賽</h2>
            <p className="text-slate-600 mb-6">請選擇你要挑戰的關卡，依照個人進度完成所有四個關卡！</p>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
              {[1, 2, 3, 4].map(lvl => {
                const levelId = 'l' + lvl;
                const isDone = completedLevels.includes(levelId);
                const info = levelInfo[lvl];
                return (
                  <button 
                    key={lvl} 
                    onClick={() => startLevel(lvl)} 
                    className={`p-6 rounded-xl border-2 text-left transition-all relative overflow-hidden group ${
                      isDone ? 'bg-green-50 border-green-300' : 'bg-white border-slate-200 hover:border-indigo-400 hover:shadow-md'
                    }`}
                  >
                    <div className={`font-bold text-xl mb-1 ${info.color}`}>{info.title}</div>
                    <div className="text-sm text-slate-500">{info.desc}</div>
                    {isDone && <div className="absolute top-4 right-4 text-green-500 text-2xl" title="已完成">✅</div>}
                    {!isDone && <div className="absolute top-4 right-4 text-slate-200 text-2xl group-hover:text-indigo-200 transition-colors">▶️</div>}
                  </button>
                );
              })}
            </div>

            <button 
              onClick={onCompleteAll} 
              disabled={!isAllDone} 
              className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${isAllDone ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
            >
              {isAllDone ? '🎉 完成乒乓賽，前往學習歷程報告' : '🔒 請先完成所有四個關卡'}
            </button>
          </div>
        );
      }

      if (isLevelFinished) {
        return (
          <CompletionScreen 
            title={`Level ${selectedLevel} 挑戰成功！`} 
            message="你已經完成這個關卡的測驗。" 
            btnText="回關卡選單" 
            onNext={() => {
              onLevelComplete('l' + selectedLevel, usedForcePass);
              setSelectedLevel(null);
            }} 
            colorClass="bg-purple-600" 
          />
        );
      }

      return (
        <div className={`bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 ${levelInfo[selectedLevel].border} w-full`}>
          <div className="flex justify-between items-baseline mb-2">
            <h2 className={`text-2xl font-bold ${levelInfo[selectedLevel].color}`}>T3. {levelInfo[selectedLevel].title}</h2>
            <div className="flex items-center gap-3 md:gap-6">
              <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold text-sm shadow-sm border border-slate-200">
                單字編號：{startIndex + currentWordIndex + 1}
              </span>
              <button onClick={() => setSelectedLevel(null)} className="text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg transition-colors font-bold border border-indigo-200">
                🔙 回選單
              </button>
            </div>
          </div>
          <p className="text-slate-500 mb-8">{levelInfo[selectedLevel].desc}</p>
          
          {selectedLevel <= 2 && (
            <div className="flex flex-col items-center">
              <button onClick={() => playAudio(currentWord?.word, currentWord?.audio)} className="w-24 h-24 bg-indigo-100 hover:bg-indigo-200 text-indigo-600 rounded-full flex items-center justify-center text-4xl mb-8 transition-transform hover:scale-105 shadow-inner">🔊</button>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                {options.map(opt => (
                  <button key={opt.id} onClick={() => handleChoice(opt)} disabled={feedback !== null} className={`p-4 rounded-xl border-2 text-lg font-medium transition-all ${feedback === 'wrong' ? 'border-red-200 bg-red-50 opacity-50' : feedback === 'correct' && opt.id === currentWord.id ? 'border-green-500 bg-green-100 text-green-700' : 'border-slate-200 bg-white hover:border-indigo-400 hover:shadow-md'}`}>{selectedLevel === 1 ? opt.word : opt.meaning}</button>
                ))}
              </div>
            </div>
          )}
          
          {selectedLevel >= 3 && (
            <div className="flex flex-col items-center text-center">
              <div className="text-5xl md:text-6xl font-bold text-slate-800 mb-8 min-h-[80px] flex items-center justify-center">{selectedLevel === 3 ? currentWord?.word : currentWord?.meaning}</div>
              <button onClick={handleListen} disabled={isListening || feedback !== null} className={`w-32 h-32 rounded-full flex flex-col items-center justify-center text-white shadow-lg transition-all transform hover:scale-105 mb-6 ${isListening ? 'bg-red-500 animate-pulse' : 'bg-indigo-500 hover:bg-indigo-600'}`}>
                <span className="text-4xl mb-1">{isListening ? '🎙️' : '🎤'}</span>
                <span className="font-bold text-sm">{isListening ? '聆聽中...' : '點擊說話'}</span>
              </button>
              {speechError && <div className="text-red-500 bg-red-50 px-4 py-2 rounded-lg mb-4 text-sm max-w-sm">{speechError}</div>}
              <button onClick={forcePass} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2 rounded-full text-sm font-bold mt-4 border border-slate-300 transition-colors shadow-sm">
                ⚡ 辨識卡住或沒麥克風？點此強制通關
              </button>
            </div>
          )}
          {feedback === 'wrong' && <div className="text-center text-red-500 mt-6 font-bold animate-pulse text-lg">再試一次！</div>}
          {feedback === 'correct' && <div className="text-center text-green-500 mt-6 font-bold animate-bounce text-lg">太棒了！</div>}
        </div>
      );
    }

    // --- 視圖 4: 學習歷程輸出 ---
    function Task4Export({ vocabList, startIndex, studentName, trackingData, setCurrentView, selectedBook, selectedUnit, selectedCategory, selectedRange }) {
      const totalWords = vocabList.length;
      
      const t1Done = trackingData.t1Completed;
      const t2Done = Object.keys(trackingData.t2TrafficLights).length === totalWords && totalWords > 0;
      const t3Done = trackingData.t3CompletedLevels.length === 4;
      const allDone = t1Done && t2Done && t3Done;

      const greenCount = Object.values(trackingData.t2TrafficLights).filter(v => v === 'green').length;
      const greenPercent = Math.round((greenCount / totalWords) * 100) || 0;
      const t1Percent = t1Done ? 100 : 0;
      const t3Percent = (trackingData.t3CompletedLevels.length / 4) * 100;
      const handlePrint = () => window.print();

      return (
        <div className="bg-white p-8 md:p-10 rounded-2xl shadow-xl border-t-8 border-indigo-600 w-full">
          <div className="text-center mb-8 border-b pb-6">
            <h2 className="text-3xl font-black text-slate-800 mb-2">學習歷程報告書</h2>
            <h3 className="text-xl text-slate-500">英文建築師</h3>
            
            <div className="mt-6 flex flex-wrap justify-center gap-3">
              <span className="bg-indigo-50 text-indigo-800 font-bold px-4 py-2 rounded-lg border border-indigo-100">學生: {studentName || '未具名'}</span>
              <span className="bg-teal-50 text-teal-800 font-bold px-4 py-2 rounded-lg border border-teal-100">冊別: {selectedBook}</span>
              <span className="bg-blue-50 text-blue-800 font-bold px-4 py-2 rounded-lg border border-blue-100">單元: {selectedUnit}</span>
              <span className="bg-purple-50 text-purple-800 font-bold px-4 py-2 rounded-lg border border-purple-100">範圍: {selectedCategory}</span>
              <span className="bg-orange-50 text-orange-800 font-bold px-4 py-2 rounded-lg border border-orange-100">題號: {selectedRange}</span>
            </div>
          </div>
          
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200"><div className="text-sm text-slate-500 mb-1">任務單字數</div><div className="text-2xl font-bold text-slate-800">{totalWords}</div></div>
            <div className="bg-blue-50 p-4 rounded-xl border border-blue-200"><div className="text-sm text-blue-600 mb-1">閃示卡完成度(T1)</div><div className="text-2xl font-bold text-blue-800">{t1Percent}%</div></div>
            <div className="bg-green-50 p-4 rounded-xl border border-green-200"><div className="text-sm text-green-600 mb-1">綠燈掌握度(T2)</div><div className="text-2xl font-bold text-green-800">{greenPercent}%</div></div>
            <div className="bg-purple-50 p-4 rounded-xl border border-purple-200"><div className="text-sm text-purple-600 mb-1">聽說綜合(T3)</div><div className="text-2xl font-bold text-purple-800">{t3Percent}%</div></div>
          </div>

          {!allDone && (
            <div className="bg-red-50 p-6 rounded-xl text-center print:hidden border border-red-200 mb-8 shadow-sm">
              <h4 className="text-red-700 font-bold mb-4 text-xl">⚠️ 還有任務尚未完成喔！</h4>
              <p className="text-slate-600 mb-4">請點擊下方按鈕，前往尚未完成的關卡：</p>
              <div className="flex flex-col md:flex-row justify-center gap-4">
                {!t1Done && <button onClick={() => setCurrentView('t1')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T1. 單字閃示卡</button>}
                {!t2Done && <button onClick={() => setCurrentView('t2')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T2. 單字紅綠燈</button>}
                {!t3Done && <button onClick={() => setCurrentView('t3')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T3. 單字乒乓賽</button>}
              </div>
            </div>
          )}

          <div className="mb-8 overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-3 font-bold text-slate-700">單字 (Word)</th><th className="p-3 font-bold text-slate-700 text-center">自評 (T2)</th><th className="p-3 font-bold text-slate-700 text-center">測驗狀態</th></tr></thead>
              <tbody>
                {vocabList.map((vocab, index) => {
                  const light = trackingData.t2TrafficLights[vocab.id];
                  return (
                    <tr key={vocab.id} className={`border-b border-slate-200 ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}>
                      <td className="p-3">
                        <div className="font-bold text-slate-800 flex items-center gap-2">
                          <span className="text-slate-400 text-sm">{startIndex + index + 1}.</span>
                          {vocab.word}
                        </div>
                        <div className="text-slate-500 text-sm ml-6">({vocab.meaning})</div>
                      </td>
                      <td className="p-3 text-center">{light === 'green' ? <span className="text-green-500 font-bold">🟢 綠燈</span> : light === 'red' ? <span className="text-red-500 font-bold">🔴 紅燈</span> : '-'}</td>
                      <td className="p-3 text-center text-indigo-600 font-bold">{allDone ? '✔️ 已完成' : '進行中'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          
          {trackingData.usedForcePass && <div className="text-sm text-slate-500 italic mb-6 text-right">* 註：口說測驗包含強制通關紀錄</div>}
          
          {allDone && (
            <div className="bg-indigo-50 p-6 rounded-xl text-center print:hidden border border-indigo-100">
              <p className="text-indigo-800 font-bold mb-4 text-xl">Great Job! 恭喜完成所有任務！</p>
              <p className="text-sm text-indigo-600 mb-6">請將此頁面列印成 PDF 或截圖，並上傳至 Google Classroom 繳交。</p>
              <button onClick={handlePrint} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:-translate-y-1 flex items-center justify-center gap-2 mx-auto text-lg">🖨️ 產生 PDF / 列印報告</button>
            </div>
          )}
        </div>
      );
    }

    // --- 共用元件: 關卡完成過渡畫面 ---
    function CompletionScreen({ title, message, btnText, onNext, colorClass = "bg-indigo-600" }) {
      return (
        <div className="bg-white p-10 rounded-2xl shadow-lg text-center border-t-4 border-slate-200 w-full">
          <div className="text-6xl mb-6">🏆</div>
          <h2 className="text-3xl font-bold text-slate-800 mb-4">{title}</h2>
          <p className="text-slate-600 mb-8 text-lg">{message}</p>
          <button onClick={onNext} className={`${colorClass} hover:opacity-90 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:-translate-y-1`}>{btnText}</button>
        </div>
      );
    }

    // --- 啟動 React 應用程式 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
