<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文建築師</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 🟢 引入 Firebase 傳統版 (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* 針對列印的樣式優化 */
    @media print {
      .print\:hidden { display: none !important; }
      body { background: white !important; }
      .shadow-lg, .shadow-xl { box-shadow: none !important; border: 1px solid #e2e8f0; }
    }
    
    /* 載入動畫 */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =========================================================================
    // 🚀 老師專屬：Firebase 雲端資料庫設定區
    // =========================================================================
    const USER_FIREBASE_CONFIG = {
      apiKey: "AIzaSyBvVtaIL-4FhgIJX34dUcvVXFiu50AWNNw",
      authDomain: "vocabulary-89032.firebaseapp.com",
      projectId: "vocabulary-89032",
      storageBucket: "vocabulary-89032.firebasestorage.app",
      messagingSenderId: "745901975039",
      appId: "1:745901975039:web:3b90101278d2433550f3ca"
    };
    // =========================================================================

    // --- 全域變數定義 ---
    const VERSIONS = ['康軒', '翰林', '南一'];
    const BOOKS = ['七上', '七下', '八上', '八下', '九上', '九下'];
    const UNITS = ['U1', 'U2', 'U3', 'U4', 'U5', 'U6'];
    const CATEGORIES = ['全部單字', '對話單字', '主題單字', '閱讀單字'];

    // --- 預設資料庫建構函式 ---
    const buildEmptyStructure = () => VERSIONS.reduce((vAcc, version) => {
      vAcc[version] = BOOKS.reduce((bAcc, book) => {
        bAcc[book] = UNITS.reduce((uAcc, unit) => { uAcc[unit] = []; return uAcc; }, {});
        return bAcc;
      }, {});
      return vAcc;
    }, {});

    const DEFAULT_VOCAB_DATA = buildEmptyStructure();
    const DEFAULT_GRAMMAR_CONCEPTS_DATA = buildEmptyStructure();
    const DEFAULT_GRAMMAR_DATA = buildEmptyStructure();

    // 預設範例資料：單字
    DEFAULT_VOCAB_DATA['康軒']['七上']['U1'] = [
      { "id": 1, "category": "主題單字", "word": "architect", "meaning": "建築師", "image": "", "audio": "" },
      { "id": 2, "category": "主題單字", "word": "vocabulary", "meaning": "字彙", "image": "", "audio": "" }
    ];

    // 預設範例資料：文法觀念 (改為寬鬆格式：標題 | 內容 | 圖片 | 音檔)
    DEFAULT_GRAMMAR_CONCEPTS_DATA['康軒']['七上']['U1'] = [
      { "id": 1, "title": "Be動詞用法 (1)", "content": "當主詞是 I (我) 的時候，搭配的 be 動詞必須是 am。\n例句：I am a student. (我是一個學生)", "image": "", "audio": "" },
      { "id": 2, "title": "Be動詞用法 (2)", "content": "當主詞是 You (你) 的時候，搭配的 be 動詞必須是 are。\n例句：You are my best friend. (你是我最好的朋友)", "image": "", "audio": "" }
    ];

    // 預設範例資料：文法挑戰
    DEFAULT_GRAMMAR_DATA['康軒']['七上']['U1'] = [
      { "id": 1, "question": "How ___ you doing today?", "options": ["is", "am", "are", "be"], "answer": "are", "explanation": "主詞為 you 時，搭配的 be 動詞必須是 are。" },
      { "id": 2, "question": "I ___ a junior high school student.", "options": ["is", "am", "are", "be"], "answer": "am", "explanation": "主詞為 I 時，搭配的 be 動詞必須是 am。" }
    ];

    // --- 共用工具函式 ---
    const playAudio = (text, customAudioUrl = null, rate = 0.9) => {
      if (customAudioUrl) {
        const audio = new Audio(customAudioUrl);
        audio.playbackRate = rate;
        audio.play().catch(e => console.error('音檔播放失敗，可能網址無效', e));
      } else if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        // 智慧判斷語言：如果包含中文字，則切換成中文語音
        const hasChinese = /[\u4e00-\u9fa5]/.test(text);
        utterance.lang = hasChinese ? 'zh-TW' : 'en-US';
        utterance.rate = rate;
        window.speechSynthesis.speak(utterance);
      }
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // --- 主應用程式元件 ---
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [studentName, setStudentName] = useState('');
      
      const [showPwdPrompt, setShowPwdPrompt] = useState(false);
      const [pwdInput, setPwdInput] = useState('');
      const [isTeacherAuthenticated, setIsTeacherAuthenticated] = useState(false);
      
      const [user, setUser] = useState(null);
      const [allVocabData, setAllVocabData] = useState(null); 
      const [allGrammarConceptsData, setAllGrammarConceptsData] = useState(null);
      const [allGrammarData, setAllGrammarData] = useState(null); 
      const [isSaving, setIsSaving] = useState(false);

      // --- 初始化 Firebase 與監聽資料 ---
      useEffect(() => {
        const initFirebase = async () => {
          try {
            if (typeof firebase === 'undefined') {
              setAllVocabData(DEFAULT_VOCAB_DATA);
              setAllGrammarConceptsData(DEFAULT_GRAMMAR_CONCEPTS_DATA);
              setAllGrammarData(DEFAULT_GRAMMAR_DATA);
              return;
            }
            if (!firebase.apps.length) firebase.initializeApp(USER_FIREBASE_CONFIG);
            const auth = firebase.auth();
            window.db = firebase.firestore();
            await auth.signInAnonymously();
            auth.onAuthStateChanged((u) => { setUser(u); });
          } catch (err) {
            console.error("驗證失敗:", err);
            setAllVocabData(DEFAULT_VOCAB_DATA);
            setAllGrammarConceptsData(DEFAULT_GRAMMAR_CONCEPTS_DATA);
            setAllGrammarData(DEFAULT_GRAMMAR_DATA);
          }
        };
        initFirebase();
      }, []);

      useEffect(() => {
        if (!user || !window.db) return;
        const vocabRef = window.db.collection('vocabulary').doc('dictionary');
        const conceptsRef = window.db.collection('vocabulary').doc('grammar_concepts');
        const grammarRef = window.db.collection('vocabulary').doc('grammar');

        const unsubVocab = vocabRef.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            let data = snapshot.data();
            if (data && data['U1'] && !data['七上'] && !data['康軒']) {
              const migratedData = JSON.parse(JSON.stringify(DEFAULT_VOCAB_DATA));
              migratedData['康軒']['七上'] = data; data = migratedData;
            } else if (data && data['七上'] && !data['康軒']) {
              const migratedData = JSON.parse(JSON.stringify(DEFAULT_VOCAB_DATA));
              migratedData['康軒'] = data; data = migratedData;
            }
            setAllVocabData(data);
          } else {
            vocabRef.set(DEFAULT_VOCAB_DATA); setAllVocabData(DEFAULT_VOCAB_DATA);
          }
        });

        const unsubConcepts = conceptsRef.onSnapshot((snapshot) => {
          if (snapshot.exists) setAllGrammarConceptsData(snapshot.data());
          else { conceptsRef.set(DEFAULT_GRAMMAR_CONCEPTS_DATA); setAllGrammarConceptsData(DEFAULT_GRAMMAR_CONCEPTS_DATA); }
        });

        const unsubGrammar = grammarRef.onSnapshot((snapshot) => {
          if (snapshot.exists) setAllGrammarData(snapshot.data());
          else { grammarRef.set(DEFAULT_GRAMMAR_DATA); setAllGrammarData(DEFAULT_GRAMMAR_DATA); }
        });

        return () => { unsubVocab(); unsubConcepts(); unsubGrammar(); };
      }, [user]);

      const saveDataToCloud = async (newData, dataType) => {
        setIsSaving(true);
        try {
          if (window.db) {
            const docName = dataType === 'vocab' ? 'dictionary' : dataType === 'grammar_concept' ? 'grammar_concepts' : 'grammar';
            const docRef = window.db.collection('vocabulary').doc(docName);
            await docRef.set(newData);
            alert("✅ 資料已成功儲存至雲端！");
          } else {
            if (dataType === 'vocab') setAllVocabData(newData);
            else if (dataType === 'grammar_concept') setAllGrammarConceptsData(newData);
            else setAllGrammarData(newData);
            alert("⚠️ 僅暫存於您的瀏覽器。");
          }
        } catch (e) {
          alert("❌ 儲存失敗！請確認 Firebase 權限。");
        } finally {
          setIsSaving(false);
        }
      };

      const [selectedVersion, setSelectedVersion] = useState('康軒');
      const [selectedBook, setSelectedBook] = useState('七上');
      const [selectedUnit, setSelectedUnit] = useState('U1');
      const [selectedCategory, setSelectedCategory] = useState('全部單字');
      const [selectedRange, setSelectedRange] = useState('全部');

      const activeVocabList = useMemo(() => {
        if (!allVocabData) return [];
        let list = allVocabData[selectedVersion]?.[selectedBook]?.[selectedUnit] || [];
        if (selectedCategory !== '全部單字') list = list.filter(v => v.category === selectedCategory);
        if (selectedRange !== '全部') {
          const parts = selectedRange.split('-');
          if (parts.length === 2) return list.slice(parseInt(parts[0], 10) - 1, parseInt(parts[1], 10));
        }
        return list;
      }, [allVocabData, selectedVersion, selectedBook, selectedUnit, selectedCategory, selectedRange]);

      const activeGrammarConceptsList = useMemo(() => {
        if (!allGrammarConceptsData) return [];
        return allGrammarConceptsData[selectedVersion]?.[selectedBook]?.[selectedUnit] || [];
      }, [allGrammarConceptsData, selectedVersion, selectedBook, selectedUnit]);

      const activeGrammarList = useMemo(() => {
        if (!allGrammarData) return [];
        return allGrammarData[selectedVersion]?.[selectedBook]?.[selectedUnit] || [];
      }, [allGrammarData, selectedVersion, selectedBook, selectedUnit]);

      useEffect(() => { setSelectedRange('全部'); }, [selectedVersion, selectedBook, selectedUnit, selectedCategory]);
      const startIndex = useMemo(() => selectedRange === '全部' ? 0 : parseInt(selectedRange.split('-')[0], 10) - 1, [selectedRange]);

      const [trackingData, setTrackingData] = useState({
        t1Completed: false, t2TrafficLights: {}, t3CompletedLevels: [], usedForcePass: false,
        t4Completed: false, t5Completed: false, t5Score: 0
      });

      const updateTracking = (key, value) => setTrackingData(prev => ({ ...prev, [key]: value }));

      const handleStart = (name) => {
        setStudentName(name);
        const vocabCount = activeVocabList.length;
        const conceptCount = activeGrammarConceptsList.length;
        const quizCount = activeGrammarList.length;
        
        // 初始化追蹤資料，若某個區塊沒有題目，則直接標示為完成，避免卡關
        setTrackingData({
          t1Completed: vocabCount === 0,
          t2TrafficLights: {},
          t3CompletedLevels: vocabCount === 0 ? ['l1','l2','l3','l4'] : [],
          usedForcePass: false,
          t4Completed: conceptCount === 0,
          t5Completed: quizCount === 0,
          t5Score: 0
        });

        // 智慧判斷第一個有內容的關卡
        if (vocabCount > 0) setCurrentView('t1');
        else if (conceptCount > 0) setCurrentView('t4');
        else if (quizCount > 0) setCurrentView('t5');
        else setCurrentView('t6');
      };

      const handleTeacherLogin = () => {
        if (pwdInput === '1234') {
          setIsTeacherAuthenticated(true); setShowPwdPrompt(false); setPwdInput(''); setCurrentView('teacher');
        } else {
          alert('密碼錯誤！請輸入 1234'); setPwdInput('');
        }
      };

      if (!allVocabData || !allGrammarConceptsData || !allGrammarData) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
             <div className="loader mb-4"></div>
             <p className="text-xl font-bold text-indigo-600 mt-4">正在連接雲端資料庫...</p>
          </div>
        );
      }

      const renderView = () => {
        switch (currentView) {
          case 'home':
            return <HomeView onStart={handleStart} activeVocabList={activeVocabList} 
                      totalCategoryWords={(allVocabData[selectedVersion]?.[selectedBook]?.[selectedUnit] || []).length}
                      conceptCount={activeGrammarConceptsList.length} grammarCount={activeGrammarList.length}
                      initialName={studentName}
                      selectedVersion={selectedVersion} setSelectedVersion={setSelectedVersion}
                      selectedBook={selectedBook} setSelectedBook={setSelectedBook}
                      selectedUnit={selectedUnit} setSelectedUnit={setSelectedUnit}
                      selectedCategory={selectedCategory} setSelectedCategory={setSelectedCategory}
                      selectedRange={selectedRange} setSelectedRange={setSelectedRange} startIndex={startIndex} />;
          case 'teacher':
            return <TeacherEditView allVocabData={allVocabData} allGrammarConceptsData={allGrammarConceptsData} allGrammarData={allGrammarData}
                      onSave={saveDataToCloud} isSaving={isSaving} onCancel={() => setCurrentView('home')} />;
          case 't1':
            return <Task1Flashcards vocabList={activeVocabList} startIndex={startIndex} onComplete={() => { updateTracking('t1Completed', true); setCurrentView('t2'); }} onSkip={() => { updateTracking('t1Completed', true); setCurrentView('t4'); }} />;
          case 't2':
            return <Task2TrafficLight vocabList={activeVocabList} startIndex={startIndex} initialData={trackingData.t2TrafficLights} onComplete={(data, isFinal) => { updateTracking('t2TrafficLights', data); if(isFinal) setCurrentView('t3'); }} />;
          case 't3':
            return <Task3PingPong vocabList={activeVocabList} startIndex={startIndex} completedLevels={trackingData.t3CompletedLevels} onLevelComplete={(levelId, usedForce) => {
                        const newLevels = trackingData.t3CompletedLevels.includes(levelId) ? trackingData.t3CompletedLevels : [...trackingData.t3CompletedLevels, levelId];
                        updateTracking('t3CompletedLevels', newLevels); if(usedForce) updateTracking('usedForcePass', true);
                      }} onCompleteAll={() => setCurrentView('t4')} />;
          case 't4':
            return <Task4GrammarConcepts conceptList={activeGrammarConceptsList} onComplete={() => { updateTracking('t4Completed', true); setCurrentView('t5'); }} onSkip={() => { updateTracking('t4Completed', true); setCurrentView('t5'); }} />;
          case 't5':
            return <Task5GrammarQuiz grammarList={activeGrammarList} onComplete={(score) => { updateTracking('t5Score', score); updateTracking('t5Completed', true); setCurrentView('t6'); }} onSkip={() => { updateTracking('t5Completed', true); setCurrentView('t6'); }} />;
          case 't6':
            return <Task6Export vocabList={activeVocabList} grammarList={activeGrammarList} conceptList={activeGrammarConceptsList} startIndex={startIndex} studentName={studentName} trackingData={trackingData} setCurrentView={setCurrentView} selectedVersion={selectedVersion} selectedBook={selectedBook} selectedUnit={selectedUnit} selectedCategory={selectedCategory} selectedRange={selectedRange} />;
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-blue-200 flex flex-col relative">
          <nav className="bg-indigo-600 text-white p-4 shadow-md print:hidden shrink-0 z-10">
            <div className="max-w-6xl mx-auto flex justify-between items-center">
              <h1 className="text-xl font-bold flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                <span className="text-2xl">🏛️</span> 英文建築師
              </h1>
              <div className="flex items-center gap-4 text-sm">
                {currentView !== 'teacher' && (
                  <button onClick={() => isTeacherAuthenticated ? setCurrentView('teacher') : setShowPwdPrompt(true)} className="bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded text-xs transition-colors shadow-sm font-bold">✏️ 老師編輯區</button>
                )}
                {currentView !== 'home' && currentView !== 'teacher' && (
                  <div className="hidden md:block text-indigo-200 font-medium">
                    {selectedVersion} - {selectedBook} - {selectedUnit}
                  </div>
                )}
                <div className="bg-indigo-700 px-3 py-1 rounded-full">{studentName ? `學生: ${studentName}` : '未登入'}</div>
              </div>
            </div>
          </nav>
          
          <div className="max-w-6xl mx-auto w-full p-4 md:p-6 mt-2 flex flex-col md:flex-row gap-6 flex-1">
            {currentView !== 'teacher' && (
              <Sidebar currentView={currentView} setCurrentView={setCurrentView} trackingData={trackingData} vocabCount={activeVocabList.length} conceptCount={activeGrammarConceptsList.length} grammarCount={activeGrammarList.length} studentName={studentName} />
            )}
            <main className={`flex-1 min-w-0 ${currentView === 'teacher' ? 'max-w-4xl mx-auto w-full' : ''}`}>
              {renderView()}
            </main>
          </div>

          {/* 老師密碼輸入彈窗 */}
          {showPwdPrompt && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                <div className="text-4xl mb-4">🔐</div>
                <h3 className="text-2xl font-bold mb-2 text-slate-800">老師身分驗證</h3>
                <p className="text-slate-500 mb-6 text-sm">請輸入管理密碼進入編輯區。<br/>(預設密碼：1234)</p>
                <input type="password" value={pwdInput} onChange={e => setPwdInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleTeacherLogin()} className="w-full border-2 border-slate-300 p-3 rounded-xl mb-6 text-center text-xl tracking-widest focus:outline-none focus:border-indigo-500" placeholder="••••" autoFocus />
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowPwdPrompt(false)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">取消</button>
                  <button onClick={handleTeacherLogin} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-md">登入</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 左側功能欄元件 (Sidebar) ---
    function Sidebar({ currentView, setCurrentView, trackingData, vocabCount, conceptCount, grammarCount, studentName }) {
      const isT2Done = vocabCount === 0 || (Object.keys(trackingData.t2TrafficLights).length === vocabCount && vocabCount > 0);
      const isT3Done = vocabCount === 0 || trackingData.t3CompletedLevels.length === 4;

      const steps = [
        { id: 'home', title: '0. 英文建築師', isDone: !!studentName },
        { id: 't1', title: 'T1. 單字閃示卡', isDone: trackingData.t1Completed },
        { id: 't2', title: 'T2. 單字紅綠燈', isDone: isT2Done },
        { id: 't3', title: 'T3. 單字乒乓賽', isDone: isT3Done },
        { id: 't4', title: 'T4. 文法小學堂', isDone: trackingData.t4Completed },
        { id: 't5', title: 'T5. 文法大挑戰', isDone: trackingData.t5Completed },
        { id: 't6', title: 'T6. 學習歷程報告', isDone: trackingData.t1Completed && isT2Done && isT3Done && trackingData.t4Completed && trackingData.t5Completed }
      ];

      return (
        <aside className="w-full md:w-64 shrink-0 print:hidden">
          <div className="bg-white rounded-2xl shadow-md p-4 sticky top-4 border-t-4 border-indigo-400">
            <h3 className="font-bold text-lg text-slate-700 mb-4 border-b pb-2 flex items-center gap-2"><span>📋</span> 任務進度</h3>
            <ul className="space-y-2">
              {steps.map((step) => {
                const isActive = currentView === step.id;
                return (
                  <li key={step.id}>
                    <button onClick={() => setCurrentView(step.id)} className={`w-full text-left flex items-center gap-3 p-3 rounded-xl transition-all ${isActive ? 'bg-indigo-50 text-indigo-700 font-bold border border-indigo-200 shadow-sm' : 'text-slate-600 hover:bg-slate-50 border border-transparent'} ${!isActive && step.isDone ? 'text-green-600 font-medium' : ''}`}>
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${isActive ? 'bg-indigo-500 text-white' : step.isDone ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-300'}`}>
                        {step.isDone && !isActive ? '✓' : ''}
                        {isActive ? '●' : ''}
                      </div>
                      <span className="flex-1 text-sm md:text-base">{step.title}</span>
                    </button>
                  </li>
                );
              })}
            </ul>
          </div>
        </aside>
      );
    }

    // --- 視圖: 教師編輯區 (三模式：單字/文法觀念/文法題目) ---
    function TeacherEditView({ allVocabData, allGrammarConceptsData, allGrammarData, onSave, isSaving, onCancel }) {
      const [editType, setEditType] = useState('vocab'); // 'vocab' | 'grammar_concept' | 'grammar_quiz'
      const [editVersion, setEditVersion] = useState('康軒');
      const [editBook, setEditBook] = useState('七上');
      const [editUnit, setEditUnit] = useState('U1');
      const [inputText, setInputText] = useState("");
      const [error, setError] = useState("");

      useEffect(() => {
        if (editType === 'vocab') {
          const list = allVocabData[editVersion]?.[editBook]?.[editUnit] || [];
          setInputText(list.map(v => `${v.category} | ${v.word} | ${v.meaning}${v.image||v.audio ? ' | '+v.image : ''}${v.audio ? ' | '+v.audio : ''}`).join('\n'));
        } else if (editType === 'grammar_concept') {
          const list = allGrammarConceptsData[editVersion]?.[editBook]?.[editUnit] || [];
          // 針對文法觀念使用雙換行 (空一行) 來區隔不同觀念卡片
          setInputText(list.map(c => `${c.title} | ${c.content}${c.image ? ' | '+c.image : ''}${c.audio ? ' | '+c.audio : ''}`).join('\n\n'));
        } else {
          const list = allGrammarData[editVersion]?.[editBook]?.[editUnit] || [];
          // 改變分隔符為 / 來顯示現有選項
          setInputText(list.map(g => `${g.question} | ${g.options.join(' / ')} | ${g.answer} | ${g.explanation || ''}`).join('\n'));
        }
        setError("");
      }, [editType, editVersion, editBook, editUnit, allVocabData, allGrammarConceptsData, allGrammarData]);

      const parseInput = () => {
        let newList = [];
        let idCount = 1;

        if (editType === 'grammar_concept') {
          // 文法觀念：以「空一行(雙換行)」作為分隔符，支援文字內換行
          const blocks = inputText.split(/\n\s*\n/);
          for (let i = 0; i < blocks.length; i++) {
            const block = blocks[i].trim();
            if (!block) continue;
            const parts = block.split('|').map(s => s.trim());
            
            let title = "文法重點";
            let content = parts[0];
            let image = "";
            let audio = "";
            
            if (parts.length >= 2) {
              title = parts[0];
              content = parts[1];
            }
            if (parts.length >= 3) image = parts[2];
            if (parts.length >= 4) audio = parts[3];

            newList.push({ id: idCount++, title, content, image, audio });
          }
        } else {
          // 單字與文法測驗：以單行作為分隔
          const lines = inputText.split('\n');
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = line.split('|').map(s => s.trim());
            
            if (editType === 'vocab') {
              if (parts.length < 2) { setError(`第 ${i + 1} 行格式錯誤，至少需包含單字與中文`); return null; }
              let category = "主題單字"; let wordIdx = 0;
              if (/^(對話|主題|閱讀)(單字)?$/.test(parts[0])) { category = parts[0].includes('對話') ? '對話單字' : parts[0].includes('閱讀') ? '閱讀單字' : '主題單字'; wordIdx = 1; }
              if (!parts[wordIdx] || !parts[wordIdx+1]) { setError(`第 ${i + 1} 行格式解析失敗`); return null; }
              newList.push({ id: idCount++, category, word: parts[wordIdx], meaning: parts[wordIdx+1], image: parts[wordIdx+2]||"", audio: parts[wordIdx+3]||"" });
            } else {
              // 文法測驗
              if (parts.length < 3) { setError(`第 ${i + 1} 行文法格式錯誤，需包含: 題目 | 選項A / 選項B / 選項C | 答案`); return null; }
              // 將原本使用逗號分切改為使用斜線 (/) 來分切選項
              const options = parts[1].split('/').map(s => s.trim()).filter(s => s);
              if (options.length < 2) { setError(`第 ${i + 1} 行選項錯誤，請用斜線 (/) 區隔選項 (至少兩個)`); return null; }
              const answer = parts[2];
              if (!options.includes(answer)) { setError(`第 ${i + 1} 行的答案 '${answer}' 必須存在於選項中`); return null; }
              newList.push({ id: idCount++, question: parts[0], options, answer, explanation: parts[3] || "" });
            }
          }
        }
        
        setError("");

        const baseData = editType === 'vocab' ? allVocabData : editType === 'grammar_concept' ? allGrammarConceptsData : allGrammarData;
        const updatedVersionData = { ...(baseData[editVersion] || {}) };
        const updatedBookData = { ...(updatedVersionData[editBook] || {}) };
        updatedBookData[editUnit] = newList;
        updatedVersionData[editBook] = updatedBookData;
        return { ...baseData, [editVersion]: updatedVersionData };
      };

      const handleSave = () => {
        const newData = parseInput();
        if (newData) onSave(newData, editType); 
      };

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-indigo-500 w-full">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 gap-4">
            <h2 className="text-2xl font-bold text-indigo-700 flex items-center gap-2">✏️ 資料編輯區</h2>
            <div className="flex flex-wrap bg-slate-100 p-1 rounded-lg gap-1">
              <button onClick={() => setEditType('vocab')} className={`px-4 py-2 rounded-md font-bold transition-all ${editType === 'vocab' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-indigo-500'}`}>📝 編輯單字</button>
              <button onClick={() => setEditType('grammar_concept')} className={`px-4 py-2 rounded-md font-bold transition-all ${editType === 'grammar_concept' ? 'bg-white text-cyan-600 shadow-sm' : 'text-slate-500 hover:text-cyan-500'}`}>📝 文法觀念</button>
              <button onClick={() => setEditType('grammar_quiz')} className={`px-4 py-2 rounded-md font-bold transition-all ${editType === 'grammar_quiz' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-emerald-500'}`}>📝 文法題目</button>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
              <label className="text-sm font-bold text-slate-700 mb-2 block">1. 選擇版本：</label>
              <select value={editVersion} onChange={e => setEditVersion(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{VERSIONS.map(v => <option key={v} value={v}>{v}</option>)}</select>
            </div>
            <div>
              <label className="text-sm font-bold text-slate-700 mb-2 block">2. 選擇冊別：</label>
              <select value={editBook} onChange={e => setEditBook(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{BOOKS.map(b => <option key={b} value={b}>{b}</option>)}</select>
            </div>
            <div>
              <label className="text-sm font-bold text-slate-700 mb-2 block">3. 選擇單元：</label>
              <select value={editUnit} onChange={e => setEditUnit(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{UNITS.map(u => <option key={u} value={u}>{u}</option>)}</select>
            </div>
          </div>

          <div className={`text-sm p-4 rounded border mb-4 ${editType === 'vocab' ? 'bg-indigo-50 border-indigo-100 text-slate-600' : editType === 'grammar_concept' ? 'bg-cyan-50 border-cyan-100 text-slate-600' : 'bg-emerald-50 border-emerald-100 text-slate-600'}`}>
            {editType === 'vocab' && (<><p className="font-bold text-indigo-700 mb-2">【單字模式】格式支援：</p><strong>[類別(選填)] | 英文單字 | 中文意思 | 圖片網址 (選填)</strong><br/><br/>範例：<span className="font-mono bg-white px-1 border rounded text-slate-500">主題單字 | apple | 蘋果</span></>)}
            {editType === 'grammar_concept' && (<><p className="font-bold text-cyan-700 mb-2">【文法觀念】寬鬆格式，支援多行說明與圖片：</p><strong>標題 | 說明內容(可換行) | 圖片網址(選填) | 音檔網址(選填)</strong><br/><br/>💡 <span className="text-cyan-600">不同觀念之間請用「空一行 (Enter兩次)」來區隔。</span><br/>範例：<span className="font-mono bg-white px-1 border rounded text-slate-500">Be動詞 | 主詞是I時搭配am... | https://img.url</span></>)}
            {editType === 'grammar_quiz' && (<><p className="font-bold text-emerald-700 mb-2">【文法題目】選擇題格式：</p><strong>題目 | 選項1 / 選項2 / 選項3 | 正確答案 | 解析(選填)</strong><br/><br/>範例：<span className="font-mono bg-white px-1 border rounded text-slate-500">He ___ a boy. | is / am / are | is | 主詞為He，搭配is</span></>)}
          </div>
          
          <textarea className={`w-full h-64 p-4 border-2 rounded-lg focus:outline-none font-mono text-sm mb-2 whitespace-pre overflow-x-auto ${editType === 'vocab' ? 'border-slate-300 focus:border-indigo-500' : editType === 'grammar_concept' ? 'border-slate-300 focus:border-cyan-500' : 'border-slate-300 focus:border-emerald-500'}`} value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="請依照上方格式輸入..."></textarea>
          
          {error && <div className="text-red-500 mb-4 font-bold text-sm bg-red-50 p-3 border border-red-200 rounded">{error}</div>}
          
          <div className="flex flex-col md:flex-row gap-4 mt-4">
            <button onClick={handleSave} disabled={isSaving} className={`flex-1 font-bold py-4 rounded-xl transition-all shadow-md flex justify-center items-center gap-2 ${isSaving ? 'bg-slate-400 text-white cursor-not-allowed' : editType === 'vocab' ? 'bg-indigo-600 hover:bg-indigo-700 text-white hover:-translate-y-1' : editType === 'grammar_concept' ? 'bg-cyan-600 hover:bg-cyan-700 text-white hover:-translate-y-1' : 'bg-emerald-600 hover:bg-emerald-700 text-white hover:-translate-y-1'}`}>
              {isSaving ? <span className="loader !w-6 !h-6 !border-2 !border-t-white"></span> : `☁️ 儲存「${editType === 'vocab' ? '單字' : editType === 'grammar_concept' ? '文法觀念' : '文法題目'}」至雲端`}
            </button>
            <button onClick={onCancel} className="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 px-8 rounded-xl transition-colors">取消並返回</button>
          </div>
        </div>
      );
    }

    // --- 視圖 0: 首頁 / 登入 ---
    function HomeView({ onStart, activeVocabList, totalCategoryWords, conceptCount, grammarCount, initialName, selectedVersion, setSelectedVersion, selectedBook, setSelectedBook, selectedUnit, setSelectedUnit, selectedCategory, setSelectedCategory, selectedRange, setSelectedRange, startIndex }) {
      const [name, setName] = useState(initialName || '');
      const [customStart, setCustomStart] = useState('');
      const [customEnd, setCustomEnd] = useState('');
      const vocabCount = activeVocabList?.length || 0;
      
      const ranges = useMemo(() => {
        const r = ['全部'];
        const maxWords = Math.max(50, totalCategoryWords);
        const max = Math.ceil(maxWords / 10) * 10;
        for (let i = 0; i < max; i += 10) { r.push(`${i + 1}-${i + 10}`); }
        return r;
      }, [totalCategoryWords]);

      const applyCustomRange = () => {
        const s = parseInt(customStart, 10); const e = parseInt(customEnd, 10);
        if (!isNaN(s) && !isNaN(e) && s > 0 && e >= s) setSelectedRange(`${s}-${e}`);
        else alert('請輸入正確的題號範圍！起始需大於0且小於等於結束數字。');
      };

      useEffect(() => {
        if (selectedRange === '全部' || ranges.includes(selectedRange)) { setCustomStart(''); setCustomEnd(''); }
      }, [selectedRange, ranges]);

      // 計算任務總數，若全部為0則不能開始
      const totalTasks = vocabCount + conceptCount + grammarCount;

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-indigo-500 w-full max-w-2xl mx-auto">
          <div className="text-center">
            <div className="text-6xl mb-4 mt-2">🏗️</div>
            <h2 className="text-3xl font-bold mb-2 text-indigo-700">英文建築師</h2>
            <p className="text-slate-500 mb-8">結合單字與文法，一步步蓋出你的英文大樓！</p>
          </div>
          
          <div className="space-y-6 mb-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">1. 選擇版本</label>
                <select value={selectedVersion} onChange={e => setSelectedVersion(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{VERSIONS.map(v => <option key={v} value={v}>{v}</option>)}</select>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">2. 選擇冊別</label>
                <select value={selectedBook} onChange={e => setSelectedBook(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{BOOKS.map(b => <option key={b} value={b}>{b}</option>)}</select>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">3. 選擇單元</label>
                <select value={selectedUnit} onChange={e => setSelectedUnit(e.target.value)} className="w-full p-2 border-2 border-slate-300 rounded-lg focus:border-indigo-500 font-bold text-slate-700 outline-none">{UNITS.map(u => <option key={u} value={u}>{u}</option>)}</select>
              </div>
            </div>

            <div>
              <label className="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span>🎯</span> 4. 單字範圍 (Filter Category)</label>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                {CATEGORIES.map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`py-2 px-1 rounded-lg font-bold text-sm transition-all border-2 ${selectedCategory === c ? 'bg-blue-100 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:border-blue-300'}`}>{c}</button>)}
              </div>
            </div>

            <div>
              <label className="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2"><span>🔢</span> 5. 單字題號 (Word Range)</label>
              <div className="flex flex-wrap gap-2 mb-3">
                {ranges.map(r => <button key={r} onClick={() => setSelectedRange(r)} className={`py-2 px-3 rounded-lg font-bold text-sm transition-all border-2 ${selectedRange === r ? 'bg-orange-100 border-orange-500 text-orange-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:border-orange-300'}`}>{r}</button>)}
              </div>
              <div className="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200 inline-flex shadow-sm">
                <span className="text-sm font-bold text-slate-600 ml-1">✏️ 自訂範圍：</span>
                <input type="number" min="1" value={customStart} onChange={(e) => setCustomStart(e.target.value)} placeholder="起" className="w-12 text-center border-b-2 border-slate-300 focus:outline-none focus:border-orange-500 text-sm font-bold text-slate-700" />
                <span className="text-slate-400 font-bold">-</span>
                <input type="number" min="1" value={customEnd} onChange={(e) => setCustomEnd(e.target.value)} placeholder="迄" className="w-12 text-center border-b-2 border-slate-300 focus:outline-none focus:border-orange-500 text-sm font-bold text-slate-700" />
                <button onClick={applyCustomRange} className="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded text-sm font-bold transition-colors ml-1 shadow-sm">套用</button>
              </div>
            </div>

            <div className="text-center pt-4 border-t border-slate-200">
              <div className="flex flex-wrap justify-center gap-4 mb-4">
                <span className="inline-block bg-white border-2 border-indigo-200 text-indigo-700 px-4 py-2 rounded-full font-bold shadow-sm">
                  📖 單字測驗：<span className="text-xl">{vocabCount}</span> 題
                </span>
                <span className="inline-block bg-white border-2 border-cyan-200 text-cyan-700 px-4 py-2 rounded-full font-bold shadow-sm">
                  💡 文法觀念：<span className="text-xl">{conceptCount}</span> 個
                </span>
                <span className="inline-block bg-white border-2 border-emerald-200 text-emerald-700 px-4 py-2 rounded-full font-bold shadow-sm">
                  📝 文法挑戰：<span className="text-xl">{grammarCount}</span> 題
                </span>
              </div>
              
              {/* 單字預覽區塊 */}
              <div className="bg-white border-2 border-slate-200 rounded-xl p-4 max-h-48 overflow-y-auto shadow-inner text-left">
                {vocabCount > 0 ? (
                  <ul className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2">
                    {activeVocabList.map((v, idx) => (
                      <li key={v.id} className="text-sm flex justify-between border-b border-slate-100 pb-1">
                        <span className="font-bold text-slate-700">{startIndex + idx + 1}. {v.word}</span>
                        <span className="text-slate-500">{v.meaning}</span>
                      </li>
                    ))}
                  </ul>
                ) : (
                  <div className="text-center text-slate-400 py-4">此範圍無單字，將自動跳過單字測驗。</div>
                )}
              </div>
            </div>
          </div>

          <div className="mb-6 text-left max-w-sm mx-auto">
            <label className="block text-sm font-bold text-slate-700 mb-2">6. 學生姓名 (Student Name)</label>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="請輸入姓名開始任務" className="w-full px-4 py-3 rounded-lg border-2 border-slate-300 focus:outline-none focus:border-indigo-500 text-lg text-center font-medium shadow-sm transition-colors" onKeyDown={(e) => { if (e.key === 'Enter' && name.trim() && totalTasks > 0) onStart(name); }} />
          </div>
          <div className="max-w-sm mx-auto">
            <button onClick={() => onStart(name || '訪客')} disabled={!name.trim() || totalTasks === 0} className={`w-full py-4 rounded-xl font-bold text-lg transition-all shadow-md ${(!name.trim() || totalTasks === 0) ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' : 'bg-indigo-600 hover:bg-indigo-700 text-white transform hover:-translate-y-1'}`}>
              {totalTasks === 0 ? '此範圍沒有任何內容喔' : '🚀 開始任務 (Start Mission)'}
            </button>
          </div>
        </div>
      );
    }

    // --- 視圖 1: 單字閃示卡 ---
    function Task1Flashcards({ vocabList, startIndex, onComplete, onSkip }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [playbackRate, setPlaybackRate] = useState(0.9);
      const currentWord = vocabList[currentIndex];

      useEffect(() => {
        if (currentWord) setTimeout(() => playAudio(currentWord.word, currentWord.audio, playbackRate), 300);
      }, [currentIndex, currentWord]);

      const handleNext = () => { if (currentIndex < vocabList.length - 1) setCurrentIndex(p => p + 1); };
      const handlePrev = () => { if (currentIndex > 0) setCurrentIndex(p => p - 1); };

      if (!vocabList || vocabList.length === 0) {
        return (
          <div className="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-blue-500 text-center">
            <h2 className="text-2xl font-bold text-blue-700 mb-4">T1. 單字閃示卡</h2>
            <p className="text-slate-500 mb-6">此單元與範圍內無單字喔！</p>
            <button onClick={onSkip} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full">直接前往文法小學堂 ➡️</button>
          </div>
        );
      }

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-blue-500 w-full">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold text-blue-700">T1. 單字閃示卡</h2>
            <span className="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-bold shadow-sm">單字編號：{startIndex + currentIndex + 1}</span>
          </div>
          
          <div className="text-center mb-8 bg-slate-50 py-10 px-4 rounded-2xl border border-slate-200 shadow-inner min-h-[300px] flex flex-col justify-center items-center relative">
            {currentWord?.image && <img src={currentWord.image} alt={currentWord.word} className="w-48 h-48 md:w-64 md:h-64 object-cover rounded-xl shadow-md mb-6 border-4 border-white bg-white" onError={(e) => { e.target.style.display = 'none'; }} />}
            <div className="text-5xl md:text-7xl font-bold text-slate-800 mb-4 tracking-wider flex items-center justify-center gap-4">
              <span className="text-3xl text-slate-300 select-none">{startIndex + currentIndex + 1}.</span>
              {currentWord?.word}
            </div>
            <div className="text-slate-500 text-2xl mb-2">{currentWord?.meaning}</div>
            <div className="text-xs text-blue-400 font-bold px-2 py-1 bg-blue-50 rounded mb-4 border border-blue-100">{currentWord?.category}</div>
            
            <div className="mt-4 flex flex-col sm:flex-row items-center gap-4">
              <button onClick={() => playAudio(currentWord?.word, currentWord?.audio, playbackRate)} className="flex items-center gap-2 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-6 py-3 rounded-full transition-colors font-bold text-lg">🔊 重聽發音</button>
              <div className="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <span className="text-sm font-bold text-slate-500 mr-1">發音速度:</span>
                {[{ label: '正常', value: 0.9 }, { label: '慢速', value: 0.6 }, { label: '最慢', value: 0.3 }].map(speed => (
                  <button key={speed.value} onClick={() => { setPlaybackRate(speed.value); playAudio(currentWord?.word, currentWord?.audio, speed.value); }} className={`px-3 py-1 rounded-lg text-sm font-bold transition-colors ${playbackRate === speed.value ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{speed.label}</button>
                ))}
              </div>
            </div>
          </div>
          
          <div className="flex justify-between items-center gap-4 mb-8">
            <button onClick={handlePrev} disabled={currentIndex === 0} className={`flex-1 py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2 ${currentIndex === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 hover:bg-slate-300 text-slate-700 shadow-sm'}`}>⬅️ 上一個</button>
            <button onClick={handleNext} disabled={currentIndex === vocabList.length - 1} className={`flex-1 py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2 ${currentIndex === vocabList.length - 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-blue-500 hover:bg-blue-600 text-white shadow-md'}`}>下一個 ➡️</button>
          </div>

          <div className="text-center border-t border-slate-200 pt-6 mt-4">
            <button onClick={onComplete} className="w-full md:w-auto px-10 py-4 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold text-xl shadow-lg transition-transform hover:-translate-y-1">✅ 完成單字複習</button>
          </div>
        </div>
      );
    }

    // --- 視圖 2: 單字紅綠燈 ---
    function Task2TrafficLight({ vocabList, startIndex, initialData, onComplete }) {
      const [evaluations, setEvaluations] = useState(initialData || {});
      const handleEval = (id, status) => { setEvaluations(prev => { const newData = { ...prev, [id]: status }; onComplete(newData, false); return newData; }); };
      const isAllEvaluated = vocabList.length > 0 && vocabList.every(v => evaluations[v.id]);

      if (!vocabList || vocabList.length === 0) return null;

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-yellow-500 w-full">
          <h2 className="text-2xl font-bold text-yellow-600 mb-2">T2. 單字紅綠燈</h2>
          <p className="text-slate-600 mb-6">請誠實面對自己！標記你對單字的熟悉度。</p>
          <div className="space-y-3 mb-8">
            {vocabList.map((vocab, index) => (
              <div key={vocab.id} className="flex items-center justify-between p-3 md:p-4 bg-slate-50 rounded-xl border border-slate-200 hover:shadow-sm transition-shadow">
                <div className="flex flex-col md:flex-row md:items-baseline gap-1 md:gap-4 flex-1">
                  <span className="font-bold text-lg text-slate-800 w-40"><span className="text-slate-400 mr-2 text-sm">{startIndex + index + 1}.</span>{vocab.word}</span>
                  <span className="text-slate-500">{vocab.meaning}</span>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => handleEval(vocab.id, 'green')} className={`px-3 py-2 rounded-lg font-bold text-sm transition-colors ${evaluations[vocab.id] === 'green' ? 'bg-green-500 text-white shadow-inner' : 'bg-white border-2 border-green-500 text-green-600 hover:bg-green-50'}`}>綠燈</button>
                  <button onClick={() => handleEval(vocab.id, 'red')} className={`px-3 py-2 rounded-lg font-bold text-sm transition-colors ${evaluations[vocab.id] === 'red' ? 'bg-red-500 text-white shadow-inner' : 'bg-white border-2 border-red-500 text-red-600 hover:bg-red-50'}`}>紅燈</button>
                </div>
              </div>
            ))}
          </div>
          <button onClick={() => onComplete(evaluations, true)} disabled={!isAllEvaluated} className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${isAllEvaluated ? 'bg-yellow-500 hover:bg-yellow-600 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
            {isAllEvaluated ? '✅ 完成評估，進入單字乒乓賽' : '請完成所有單字評估'}
          </button>
        </div>
      );
    }

    // --- 視圖 3: 單字乒乓賽 ---
    function Task3PingPong({ vocabList, startIndex, completedLevels, onLevelComplete, onCompleteAll }) {
      const [selectedLevel, setSelectedLevel] = useState(null);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [options, setOptions] = useState([]);
      const [feedback, setFeedback] = useState(null);
      const [usedForcePass, setUsedForcePass] = useState(false);
      const [isListening, setIsListening] = useState(false);
      const [isRandomOrder, setIsRandomOrder] = useState(false);
      const [levelVocabList, setLevelVocabList] = useState([]);

      const currentWord = levelVocabList[currentWordIndex];
      const isLevelFinished = selectedLevel && currentWordIndex >= levelVocabList.length;

      const levelInfo = {
        1: { title: "L1 聽音辨字", color: "text-purple-600", border: "border-purple-500" },
        2: { title: "L2 聽音辨義", color: "text-pink-600", border: "border-pink-500" },
        3: { title: "L3 看英說英", color: "text-orange-600", border: "border-orange-500" },
        4: { title: "L4 看中說英", color: "text-red-600", border: "border-red-500" }
      };

      const startLevel = (lvl) => {
        setSelectedLevel(lvl); setCurrentWordIndex(0); setFeedback(null); setUsedForcePass(false);
        setLevelVocabList(isRandomOrder ? shuffleArray(vocabList) : [...vocabList]);
      };

      useEffect(() => {
        if (selectedLevel <= 2 && !isLevelFinished && currentWord) {
          const wrongOptions = vocabList.filter(v => v.id !== currentWord.id).sort(() => 0.5 - Math.random()).slice(0, 3);
          setOptions(shuffleArray([...wrongOptions, currentWord]));
          if (selectedLevel <= 2) setTimeout(() => playAudio(currentWord.word, currentWord.audio), 300);
        }
      }, [currentWordIndex, selectedLevel, isLevelFinished, currentWord, vocabList]);

      const handleListen = async () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        setIsListening(true); 
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; recognition.interimResults = false; recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.toLowerCase().trim();
          const cleanTranscript = transcript.replace(/[.,!?]/g, "");
          const targetWord = currentWord.word.toLowerCase();
          if (cleanTranscript.includes(targetWord) || targetWord.includes(cleanTranscript)) {
            setFeedback('correct'); playAudio("Excellent"); setTimeout(() => { setFeedback(null); setCurrentWordIndex(prev => prev + 1); }, 1000);
          } else {
            setFeedback('wrong'); setTimeout(() => setFeedback(null), 2000);
          }
          setIsListening(false);
        };
        recognition.onerror = () => setIsListening(false);
        recognition.onend = () => setIsListening(false);
        try { recognition.start(); } catch (err) { setIsListening(false); }
      };

      const forcePass = () => {
        setUsedForcePass(true); setFeedback('correct');
        setTimeout(() => { setFeedback(null); setCurrentWordIndex(prev => prev + 1); }, 500);
      };

      if (!vocabList || vocabList.length === 0) return null;

      if (!selectedLevel) {
        const isAllDone = completedLevels.length >= 4;
        return (
          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-indigo-500 w-full">
            <h2 className="text-2xl font-bold text-indigo-700 mb-6">T3. 單字乒乓賽</h2>
            <div className="mb-6 flex items-center gap-3 bg-indigo-50 p-3 rounded-xl border border-indigo-100 w-fit">
              <input type="checkbox" id="randomOrderToggle" checked={isRandomOrder} onChange={(e) => setIsRandomOrder(e.target.checked)} className="w-5 h-5 text-indigo-600 cursor-pointer" />
              <label htmlFor="randomOrderToggle" className="font-bold text-indigo-800 cursor-pointer select-none">🔀 隨機出題順序</label>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
              {[1, 2, 3, 4].map(lvl => (
                <button key={lvl} onClick={() => startLevel(lvl)} className={`p-6 rounded-xl border-2 text-left relative ${completedLevels.includes('l'+lvl) ? 'bg-green-50 border-green-300' : 'bg-white hover:border-indigo-400'}`}>
                  <div className={`font-bold text-xl mb-1 ${levelInfo[lvl].color}`}>{levelInfo[lvl].title}</div>
                  {completedLevels.includes('l'+lvl) && <div className="absolute top-4 right-4 text-green-500 text-2xl">✅</div>}
                </button>
              ))}
            </div>
            <button onClick={onCompleteAll} disabled={!isAllDone} className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${isAllDone ? 'bg-indigo-600 hover:bg-indigo-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
              {isAllDone ? '✅ 完成乒乓賽，前往文法小學堂' : '🔒 請先完成所有四個關卡'}
            </button>
          </div>
        );
      }

      if (isLevelFinished) {
        return <CompletionScreen title={`Level ${selectedLevel} 完成！`} message="" btnText="回關卡選單" onNext={() => { onLevelComplete('l' + selectedLevel, usedForcePass); setSelectedLevel(null); }} />;
      }

      return (
        <div className={`bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 ${levelInfo[selectedLevel].border} w-full`}>
          <div className="flex justify-between items-baseline mb-6">
            <h2 className={`text-2xl font-bold ${levelInfo[selectedLevel].color}`}>T3. {levelInfo[selectedLevel].title}</h2>
            <div className="flex items-center gap-3 md:gap-6">
              <span className="bg-slate-100 px-3 py-1 rounded-full font-bold text-sm">進度: {currentWordIndex + 1} / {levelVocabList.length}</span>
              <button onClick={() => setSelectedLevel(null)} className="text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg transition-colors font-bold border border-indigo-200">🔙 回選單</button>
            </div>
          </div>
          
          {selectedLevel <= 2 && (
            <div className="flex flex-col items-center">
              <button onClick={() => playAudio(currentWord?.word)} className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full text-4xl mb-8">🔊</button>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                {options.map(opt => (
                  <button key={opt.id} onClick={() => { setFeedback(opt.id===currentWord.id?'correct':'wrong'); if(opt.id===currentWord.id){ playAudio("Correct"); setTimeout(()=>{setFeedback(null);setCurrentWordIndex(p=>p+1);},1000); }else{setTimeout(()=>setFeedback(null),800)} }} disabled={feedback !== null} className={`p-4 rounded-xl border-2 text-lg font-medium ${feedback === 'wrong' ? 'border-red-200 bg-red-50 opacity-50' : feedback === 'correct' && opt.id === currentWord.id ? 'border-green-500 bg-green-100 text-green-700' : 'bg-white hover:border-indigo-400'}`}>
                    {selectedLevel === 1 ? opt.word : opt.meaning}
                  </button>
                ))}
              </div>
            </div>
          )}
          
          {selectedLevel >= 3 && (
            <div className="flex flex-col items-center text-center">
              <div className="text-5xl font-bold text-slate-800 mb-8">{selectedLevel === 3 ? currentWord?.word : currentWord?.meaning}</div>
              <button onClick={handleListen} disabled={isListening || feedback !== null} className={`w-32 h-32 rounded-full flex flex-col items-center justify-center text-white shadow-lg transition-all transform hover:scale-105 mb-6 ${isListening ? 'bg-red-500 animate-pulse' : 'bg-indigo-500 hover:bg-indigo-600'}`}>
                <span className="text-4xl mb-1">{isListening ? '🎙️' : '🎤'}</span>
                <span className="font-bold text-sm">{isListening ? '聆聽中...' : '點擊說話'}</span>
              </button>
              <button onClick={forcePass} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2 rounded-full text-sm font-bold mt-4 border border-slate-300 transition-colors shadow-sm">⚡ 強制通關</button>
            </div>
          )}
          {feedback === 'wrong' && <div className="text-center text-red-500 mt-6 font-bold animate-pulse text-lg">再試一次！</div>}
        </div>
      );
    }

    // --- 🟢 新增視圖 4: 文法觀念教學 (Task 4 Grammar Concepts) ---
    function Task4GrammarConcepts({ conceptList, onComplete, onSkip }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [playbackRate, setPlaybackRate] = useState(0.9);
      const currentConcept = conceptList[currentIndex];

      useEffect(() => {
        if (currentConcept) setTimeout(() => playAudio(currentConcept.content, currentConcept.audio, playbackRate), 300);
      }, [currentIndex, currentConcept]);

      const handleNext = () => { if (currentIndex < conceptList.length - 1) setCurrentIndex(p => p + 1); };
      const handlePrev = () => { if (currentIndex > 0) setCurrentIndex(p => p - 1); };

      if (!conceptList || conceptList.length === 0) {
        return (
          <div className="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-cyan-500 text-center">
            <h2 className="text-2xl font-bold text-cyan-700 mb-4">T4. 文法小學堂</h2>
            <p className="text-slate-500 mb-6">此單元老師尚未建立文法觀念喔！</p>
            <button onClick={onSkip} className="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-8 rounded-full">直接前往文法大挑戰 ➡️</button>
          </div>
        );
      }

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-cyan-500 w-full">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-2xl font-bold text-cyan-700">T4. 文法小學堂</h2>
            <span className="bg-cyan-100 text-cyan-800 px-4 py-1 rounded-full text-sm font-bold shadow-sm">觀念編號：{currentIndex + 1} / {conceptList.length}</span>
          </div>

          {/* 新增：觀念選擇選單 */}
          <div className="mb-6 bg-cyan-50 p-4 rounded-xl border border-cyan-100">
            <p className="text-cyan-800 font-bold mb-3 text-sm flex items-center gap-2">
              <span>🎯</span> 選擇你想學習的觀念：
            </p>
            <div className="flex flex-wrap gap-2">
              {conceptList.map((c, idx) => (
                <button
                  key={c.id}
                  onClick={() => setCurrentIndex(idx)}
                  className={`px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-sm ${
                    currentIndex === idx 
                      ? 'bg-cyan-500 text-white ring-2 ring-cyan-300' 
                      : 'bg-white border border-slate-200 text-slate-600 hover:border-cyan-400 hover:text-cyan-700'
                  }`}
                >
                  觀念 {idx + 1}：{c.title}
                </button>
              ))}
            </div>
          </div>
          
          <div className="text-center mb-8 bg-slate-50 py-10 px-4 rounded-2xl border border-slate-200 shadow-inner min-h-[300px] flex flex-col justify-center items-center relative">
            
            <div className="text-2xl font-bold text-cyan-700 bg-cyan-100 px-4 py-1 rounded-full mb-6 border border-cyan-200">
              {currentConcept?.title}
            </div>

            {currentConcept?.image && (
              <img src={currentConcept.image} alt="Grammar Concept" className="max-w-full max-h-64 object-contain rounded-xl shadow-md mb-6 border-4 border-white bg-white" onError={(e) => { e.target.style.display = 'none'; }} />
            )}
            
            <div className="text-slate-700 text-xl md:text-2xl mb-2 font-medium px-6 py-4 text-left w-full max-w-3xl whitespace-pre-wrap leading-relaxed">
              {currentConcept?.content}
            </div>
            
            <div className="mt-8 flex flex-col sm:flex-row items-center gap-4">
              <button onClick={() => playAudio(currentConcept?.content, currentConcept?.audio, playbackRate)} className="flex items-center gap-2 bg-cyan-100 hover:bg-cyan-200 text-cyan-700 px-6 py-3 rounded-full transition-colors font-bold text-lg">🔊 語音播放</button>
              <div className="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <span className="text-sm font-bold text-slate-500 mr-1">語速:</span>
                {[{ label: '正常', value: 0.9 }, { label: '慢速', value: 0.6 }, { label: '最慢', value: 0.3 }].map(speed => (
                  <button key={speed.value} onClick={() => { setPlaybackRate(speed.value); playAudio(currentConcept?.content, currentConcept?.audio, speed.value); }} className={`px-3 py-1 rounded-lg text-sm font-bold transition-colors ${playbackRate === speed.value ? 'bg-cyan-500 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{speed.label}</button>
                ))}
              </div>
            </div>
          </div>
          
          <div className="flex justify-between items-center gap-4 mb-8">
            <button onClick={handlePrev} disabled={currentIndex === 0} className={`flex-1 py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2 ${currentIndex === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 hover:bg-slate-300 text-slate-700 shadow-sm'}`}>⬅️ 上一個觀念</button>
            <button onClick={handleNext} disabled={currentIndex === conceptList.length - 1} className={`flex-1 py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2 ${currentIndex === conceptList.length - 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-cyan-500 hover:bg-cyan-600 text-white shadow-md'}`}>下一個觀念 ➡️</button>
          </div>

          <div className="text-center border-t border-slate-200 pt-6 mt-4">
            <button onClick={onComplete} className="w-full md:w-auto px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold text-xl shadow-lg transition-transform hover:-translate-y-1">✅ 觀念學習完畢，進入文法挑戰</button>
          </div>
        </div>
      );
    }

    // --- 視圖 5: 文法大挑戰 (Task 5 Grammar Quiz) ---
    function Task5GrammarQuiz({ grammarList, onComplete, onSkip }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [score, setScore] = useState(0);
      const [showExplanation, setShowExplanation] = useState(false);
      
      const isFinished = currentIndex >= grammarList.length;
      const currentQ = grammarList[currentIndex];

      if (!grammarList || grammarList.length === 0) {
        return (
          <div className="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-emerald-500 text-center">
            <h2 className="text-2xl font-bold text-emerald-700 mb-4">T5. 文法大挑戰</h2>
            <p className="text-slate-500 mb-6">此單元老師尚未建立文法題目喔！</p>
            <button onClick={onSkip} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-full">直接前往學習歷程報告 ➡️</button>
          </div>
        );
      }

      if (isFinished) {
        return (
          <div className="bg-white p-10 rounded-2xl shadow-lg text-center border-t-4 border-emerald-500">
            <div className="text-6xl mb-4">🏆</div>
            <h2 className="text-3xl font-bold text-slate-800 mb-2">文法挑戰完成！</h2>
            <p className="text-xl text-emerald-600 font-bold mb-8">答對題數：{score} / {grammarList.length}</p>
            <button onClick={() => onComplete(score)} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-full shadow-lg">產生最終學習報告 ➡️</button>
          </div>
        );
      }

      const handleOptionClick = (opt) => {
        if (selectedOption) return; // 已經作答過
        setSelectedOption(opt);
        if (opt === currentQ.answer) {
          setScore(s => s + 1); playAudio("Correct"); setTimeout(handleNext, 1200); 
        } else {
          playAudio("Wrong", null, 1.5); setShowExplanation(true); 
        }
      };

      const handleNext = () => { setSelectedOption(null); setShowExplanation(false); setCurrentIndex(p => p + 1); };

      return (
        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border-t-4 border-emerald-500 w-full">
          <div className="flex justify-between items-baseline mb-6 border-b pb-4">
            <h2 className="text-2xl font-bold text-emerald-700">T5. 文法大挑戰</h2>
            <span className="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold text-sm">進度：{currentIndex + 1} / {grammarList.length}</span>
          </div>

          <div className="text-2xl md:text-3xl font-bold text-slate-800 mb-8 mt-4 leading-relaxed">
            {currentIndex + 1}. {currentQ.question}
          </div>

          <div className="flex flex-col gap-3 mb-8">
            {currentQ.options.map((opt, idx) => {
              let btnClass = "bg-white border-2 border-slate-200 text-slate-700 hover:border-emerald-400";
              if (selectedOption) {
                if (opt === currentQ.answer) btnClass = "bg-emerald-100 border-emerald-500 text-emerald-800 font-bold";
                else if (opt === selectedOption) btnClass = "bg-red-50 border-red-400 text-red-600 line-through";
                else btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
              }
              return (
                <button key={idx} onClick={() => handleOptionClick(opt)} disabled={!!selectedOption} className={`w-full text-left p-4 rounded-xl text-lg transition-all ${btnClass}`}>
                  <span className="inline-block w-8 font-bold">{['A', 'B', 'C', 'D', 'E'][idx]}.</span> {opt}
                </button>
              );
            })}
          </div>

          {showExplanation && (
            <div className="bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-lg mb-6 animate-pulse">
              <p className="font-bold text-orange-800 mb-1">💡 解析：</p>
              <p className="text-orange-700">{currentQ.explanation || '老師沒有提供解析喔，正確答案是 ' + currentQ.answer}</p>
            </div>
          )}
          {showExplanation && <div className="text-right"><button onClick={handleNext} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-full shadow-md">了解了，下一題 ➡️</button></div>}
        </div>
      );
    }

    // --- 視圖 6: 學習歷程輸出 (原 Task5) ---
    function Task6Export({ vocabList, grammarList, conceptList, startIndex, studentName, trackingData, setCurrentView, selectedVersion, selectedBook, selectedUnit, selectedCategory, selectedRange }) {
      const totalWords = vocabList.length;
      const totalGrammar = grammarList.length;
      
      const t1Done = totalWords === 0 || trackingData.t1Completed;
      const t2Done = totalWords === 0 || (Object.keys(trackingData.t2TrafficLights).length === totalWords && totalWords > 0);
      const t3Done = totalWords === 0 || trackingData.t3CompletedLevels.length === 4;
      const t4Done = trackingData.t4Completed;
      const t5Done = trackingData.t5Completed;
      const allDone = t1Done && t2Done && t3Done && t4Done && t5Done;

      const greenCount = Object.values(trackingData.t2TrafficLights).filter(v => v === 'green').length;
      const greenPercent = totalWords > 0 ? Math.round((greenCount / totalWords) * 100) : 100;
      const grammarScorePercent = totalGrammar > 0 ? Math.round((trackingData.t5Score / totalGrammar) * 100) : 100;
      
      const handlePrint = () => window.print();

      return (
        <div className="bg-white p-8 md:p-10 rounded-2xl shadow-xl border-t-8 border-indigo-600 w-full">
          <div className="text-center mb-8 border-b pb-6">
            <h2 className="text-3xl font-black text-slate-800 mb-2">學習歷程報告書</h2>
            <h3 className="text-xl text-slate-500">英文建築師</h3>
            
            <div className="mt-6 flex flex-wrap justify-center gap-3">
              <span className="bg-indigo-50 text-indigo-800 font-bold px-3 py-1 rounded border border-indigo-100">{studentName || '未具名'}</span>
              <span className="bg-rose-50 text-rose-800 font-bold px-3 py-1 rounded border border-rose-100">{selectedVersion}</span>
              <span className="bg-teal-50 text-teal-800 font-bold px-3 py-1 rounded border border-teal-100">{selectedBook}</span>
              <span className="bg-blue-50 text-blue-800 font-bold px-3 py-1 rounded border border-blue-100">{selectedUnit}</span>
              <span className="bg-purple-50 text-purple-800 font-bold px-3 py-1 rounded border border-purple-100">{selectedCategory} ({selectedRange})</span>
            </div>
          </div>
          
          <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8 text-center">
            <div className="bg-slate-50 p-2 rounded-xl border border-slate-200"><div className="text-xs text-slate-500 mb-1">單字總數</div><div className="text-lg font-bold text-slate-800">{totalWords}</div></div>
            <div className="bg-blue-50 p-2 rounded-xl border border-blue-200"><div className="text-xs text-blue-600 mb-1">單字閃卡</div><div className="text-lg font-bold text-blue-800">{t1Done ? '完成' : '未完'}</div></div>
            <div className="bg-green-50 p-2 rounded-xl border border-green-200"><div className="text-xs text-green-600 mb-1">綠燈掌握</div><div className="text-lg font-bold text-green-800">{totalWords===0?'-':greenPercent+'%'}</div></div>
            <div className="bg-purple-50 p-2 rounded-xl border border-purple-200"><div className="text-xs text-purple-600 mb-1">單字聽說</div><div className="text-lg font-bold text-purple-800">{totalWords===0?'-':trackingData.t3CompletedLevels.length+'/4'}</div></div>
            <div className="bg-cyan-50 p-2 rounded-xl border border-cyan-200"><div className="text-xs text-cyan-600 mb-1">文法觀念</div><div className="text-lg font-bold text-cyan-800">{conceptList.length===0?'-':t4Done?'完成':'未完'}</div></div>
            <div className="bg-emerald-50 p-2 rounded-xl border border-emerald-200"><div className="text-xs text-emerald-600 mb-1">文法測驗</div><div className="text-lg font-bold text-emerald-800">{totalGrammar===0?'-':grammarScorePercent+'分'}</div></div>
          </div>

          {!allDone && (
            <div className="bg-red-50 p-6 rounded-xl text-center print:hidden border border-red-200 mb-8 shadow-sm">
              <h4 className="text-red-700 font-bold mb-4 text-xl">⚠️ 還有任務尚未完成喔！</h4>
              <p className="text-slate-600 mb-4">請點擊下方按鈕，前往尚未完成的關卡：</p>
              <div className="flex flex-col md:flex-row flex-wrap justify-center gap-4">
                {!t1Done && <button onClick={() => setCurrentView('t1')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T1. 單字閃示卡</button>}
                {!t2Done && <button onClick={() => setCurrentView('t2')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T2. 單字紅綠燈</button>}
                {!t3Done && <button onClick={() => setCurrentView('t3')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T3. 單字乒乓賽</button>}
                {!t4Done && <button onClick={() => setCurrentView('t4')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T4. 文法小學堂</button>}
                {!t5Done && <button onClick={() => setCurrentView('t5')} className="bg-white border-2 border-red-400 text-red-600 px-6 py-3 rounded-lg font-bold hover:bg-red-100 transition-colors shadow-sm">前往 T5. 文法大挑戰</button>}
              </div>
            </div>
          )}

          {totalWords > 0 && (
            <div className="mb-8 overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-3 font-bold text-slate-700">單字 (Word)</th><th className="p-3 font-bold text-slate-700 text-center">自評 (T2)</th><th className="p-3 font-bold text-slate-700 text-center">測驗狀態</th></tr></thead>
                <tbody>
                  {vocabList.map((vocab, index) => {
                    const light = trackingData.t2TrafficLights[vocab.id];
                    return (
                      <tr key={vocab.id} className={`border-b border-slate-200 ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}>
                        <td className="p-3">
                          <div className="font-bold text-slate-800 flex items-center gap-2">
                            <span className="text-slate-400 text-sm">{startIndex + index + 1}.</span>
                            {vocab.word}
                          </div>
                          <div className="text-slate-500 text-sm ml-6">({vocab.meaning})</div>
                        </td>
                        <td className="p-3 text-center">{light === 'green' ? <span className="text-green-500 font-bold">🟢 綠燈</span> : light === 'red' ? <span className="text-red-500 font-bold">🔴 紅燈</span> : '-'}</td>
                        <td className="p-3 text-center text-indigo-600 font-bold">{allDone ? '✔️ 已完成' : '進行中'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          
          {trackingData.usedForcePass && <div className="text-sm text-slate-500 italic mb-6 text-right">* 註：口說測驗包含強制通關紀錄</div>}
          
          {allDone && (
            <div className="bg-indigo-50 p-6 rounded-xl text-center print:hidden border border-indigo-100 mb-8">
              <p className="text-indigo-800 font-bold mb-2 text-xl">Great Job! 恭喜完成所有任務！</p>
              <p className="text-sm text-indigo-600">請將此頁面列印成 PDF 或截圖，並上傳至 Google Classroom 繳交。</p>
            </div>
          )}

          <div className="text-center print:hidden mb-4">
            <button onClick={handlePrint} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:-translate-y-1 inline-flex items-center gap-2">🖨️ 列印學習報告 (PDF)</button>
          </div>
        </div>
      );
    }

    function CompletionScreen({ title, message, btnText, onNext, colorClass = "bg-indigo-600" }) {
      return (
        <div className="bg-white p-10 rounded-2xl shadow-lg text-center border-t-4 border-slate-200 w-full">
          <div className="text-6xl mb-6">🏆</div>
          <h2 className="text-3xl font-bold text-slate-800 mb-4">{title}</h2>
          <p className="text-slate-600 mb-8 text-lg">{message}</p>
          <button onClick={onNext} className={`${colorClass} hover:opacity-90 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform hover:-translate-y-1`}>{btnText}</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
